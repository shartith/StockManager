name: Docker Publish

# main 에 푸시되면 multi-arch (amd64+arm64) 이미지를 빌드해서
# Docker Hub (shartith0106/stock-manager) 에 publish.
# 태그: <package.json version> + latest.
# 수동 트리거도 가능 (workflow_dispatch).

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          v="$(node -p "require('./package.json').version")"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building image tag: $v"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            shartith0106/stock-manager:${{ steps.version.outputs.version }}
            shartith0106/stock-manager:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Pushed images"
            echo ""
            echo "- \`shartith0106/stock-manager:${{ steps.version.outputs.version }}\`"
            echo "- \`shartith0106/stock-manager:latest\`"
            echo ""
            echo "### NAS deploy"
            echo ""
            echo "\`\`\`bash"
            echo "docker compose pull stock-manager && docker compose up -d stock-manager"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
