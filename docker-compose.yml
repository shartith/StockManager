services:
  stock-manager:
    image: shartith0106/stock-manager:latest
    container_name: stock-manager
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - stock-manager-data:/data
    environment:
      TZ: Asia/Seoul
      PORT: "3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  stock-manager-data:
    name: stock-manager-data
